<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Algebra Quiz & Answer Key</title>
    <script>
      MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body { 
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(180deg,#eef6ff 0%, #f7f9fb 100%); 
            padding: 16px; 
            color: #202124; 
            margin: 0;
            min-height: 100vh;
        }
        
        .container { 
            max-width: 100%;
            width: 100%;
            margin: 0 auto; 
            background: white; 
            border-radius: 16px; 
            border-top: 8px solid #1a73e8; 
            padding: 24px; 
            box-shadow: 0 6px 24px rgba(18, 40, 80, 0.08);
            box-sizing: border-box;
        }
        
        h1 { 
            font-size: 28px; 
            margin-bottom: 8px; 
            line-height: 1.3;
            word-wrap: break-word;
        }
        
        .subtitle { 
            color: #5f6368; 
            margin-bottom: 24px; 
            font-size: 16px;
            line-height: 1.5;
        }
        
        .question { 
            background: #ffffff; 
            border: 1px solid #e6eefc; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            transition: all 220ms ease; 
            position: relative;
            box-sizing: border-box;
            width: 100%;
        }
        
        .question.correct { 
            border-color: #c7f0d1; 
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.06); 
        }
        
        .question.incorrect { 
            border-color: #ffd6d6; 
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.06); 
        }
        
        .question-text { 
            font-size: 17px; 
            margin-bottom: 18px; 
            font-weight: 600; 
            color: #202124;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .options { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }
        
        .options li { 
            margin-bottom: 14px; 
            display: flex; 
            align-items: center; 
            width: 100%;
        }
        
        input[type="radio"] { 
            margin-right: 12px; 
            cursor: pointer; 
            accent-color: #1a73e8;
            flex-shrink: 0;
        }
        
        label.option-label { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 12px 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: background 160ms ease, border 160ms ease; 
            width: 100%;
            box-sizing: border-box;
            border: 1px solid transparent;
            background: #f8fafc;
        }
        
        label.option-label:hover { 
            background: #f0f7ff; 
            border-color: #1a73e8;
        }
        
        label.correct-label { 
            background: #e9f8ee; 
            border: 1px solid #c7f0d1; 
        }
        
        label.selected-wrong { 
            background: #fff4f4; 
            border: 1px solid #ffd6d6; 
        }
        
        label.selected-correct { 
            background: #ebf9ee; 
            border: 1px solid #8de08d; 
        }
        
        input[type="text"] { 
            width: 100%; 
            border: none; 
            border-bottom: 2px solid #dadce0; 
            padding: 10px 0; 
            font-size: 16px; 
            outline: none;
            background: transparent;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus { 
            border-bottom: 2px solid #1a73e8; 
        }
        
        .submit-btn { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 16px 24px; 
            font-size: 17px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            width: 100%; 
            margin-top: 20px;
            transition: all 0.2s ease;
        }
        
        .submit-btn:hover {
            background-color: #0d62d9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }
        
        #result-section { 
            display: none; 
            text-align: center; 
            padding: 24px 16px; 
        }
        
        .score-display { 
            font-size: 48px; 
            font-weight: 700; 
            color: #1a73e8; 
            margin: 16px 0; 
        }
        
        #answer-key { 
            display: none; 
            margin-top: 32px; 
            border-top: 2px solid #34a853; 
            padding-top: 24px; 
        }
        
        .solution-card { 
            border: 1px solid #e6eefc; 
            border-radius: 12px; 
            padding: 18px; 
            margin-bottom: 16px; 
            text-align: left; 
            background: #fcfeff; 
            box-sizing: border-box;
            width: 100%;
        }
        
        .correct-ans { 
            color: #0b8043; 
            font-weight: 700; 
            font-size: 16px;
        }
        
        .explanation { 
            background: #f8f9fa; 
            padding: 14px; 
            border-left: 4px solid #34a853; 
            margin-top: 12px; 
            font-size: 15px;
            line-height: 1.5;
            border-radius: 0 8px 8px 0;
        }
        
        .view-key-btn { 
            background-color: #34a853; 
            color: white; 
            border: none; 
            padding: 14px 22px; 
            font-size: 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.2s ease;
            min-height: 48px;
        }
        
        .view-key-btn:hover {
            background-color: #2d9c4a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 168, 83, 0.2);
        }
        
        .controls { 
            display: flex; 
            gap: 16px; 
            margin-top: 20px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        
        .tiny-btn { 
            padding: 12px 20px; 
            border-radius: 10px; 
            border: 1px solid #dfe3ea; 
            background: white; 
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .tiny-btn:hover {
            background: #f8f9fa;
            border-color: #1a73e8;
            transform: translateY(-2px);
        }
        
        .feedback { 
            margin-top: 12px; 
            font-size: 15px;
        }
        
        .feedback .your { 
            font-weight: 600; 
        }
        
        .badge { 
            position: absolute; 
            top: 16px; 
            right: 16px; 
            font-size: 14px; 
            padding: 8px 14px; 
            border-radius: 999px; 
            color: white; 
            font-weight: 600;
        }
        
        .badge.correct { 
            background: #16a34a; 
        }
        
        .badge.incorrect { 
            background: #ef4444; 
        }
        
        .footer { 
            margin-top: 32px; 
            text-align: center; 
            color: #5f6368; 
            font-size: 14px; 
            padding-top: 20px; 
            border-top: 1px solid #edf2f7; 
        }
        
        .footer .author { 
            font-weight: 600; 
            color: #202124; 
        }
        
        /* Mobile-First Responsive Design */
        @media (min-width: 768px) {
            body { 
                padding: 24px; 
            }
            
            .container { 
                max-width: 800px; 
                padding: 32px; 
                margin: 0 auto;
            }
            
            h1 { 
                font-size: 32px; 
            }
            
            .question { 
                padding: 24px; 
            }
            
            .question-text { 
                font-size: 18px; 
            }
            
            .options li { 
                margin-bottom: 16px; 
            }
            
            label.option-label { 
                padding: 14px 20px; 
            }
            
            .submit-btn { 
                padding: 18px 28px; 
                font-size: 18px; 
            }
            
            .score-display { 
                font-size: 56px; 
            }
            
            .solution-card { 
                padding: 22px; 
            }
            
            .explanation { 
                padding: 16px; 
                font-size: 16px; 
            }
            
            .view-key-btn { 
                padding: 16px 26px; 
                font-size: 17px; 
            }
            
            .tiny-btn {
                padding: 14px 24px;
            }
        }
        
        @media (max-width: 767px) {
            body { 
                padding: 12px; 
            }
            
            .container { 
                padding: 20px; 
                border-radius: 14px;
                margin: 0 auto;
            }
            
            h1 { 
                font-size: 24px; 
                margin-bottom: 10px;
            }
            
            .subtitle { 
                font-size: 15px; 
                margin-bottom: 20px;
            }
            
            .question { 
                padding: 18px; 
                margin-bottom: 18px;
                border-radius: 10px;
            }
            
            .question-text { 
                font-size: 16px; 
                margin-bottom: 16px;
                line-height: 1.5;
            }
            
            .options li { 
                margin-bottom: 12px; 
            }
            
            label.option-label { 
                padding: 10px 14px; 
                font-size: 15px;
                line-height: 1.4;
            }
            
            .submit-btn { 
                padding: 14px 20px; 
                font-size: 16px; 
                border-radius: 8px;
            }
            
            .score-display { 
                font-size: 42px; 
                margin: 14px 0;
            }
            
            .solution-card { 
                padding: 16px; 
                margin-bottom: 14px;
            }
            
            .explanation { 
                padding: 12px; 
                font-size: 14px;
                margin-top: 10px;
            }
            
            .view-key-btn { 
                padding: 12px 20px; 
                font-size: 15px;
                min-height: 44px;
            }
            
            .tiny-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
            
            .controls { 
                gap: 12px; 
                margin-top: 16px;
            }
            
            .badge { 
                top: 12px; 
                right: 12px; 
                font-size: 13px; 
                padding: 6px 12px; 
            }
            
            .footer { 
                margin-top: 24px; 
                font-size: 13px; 
                padding-top: 16px;
            }
        }
        
        @media (max-width: 480px) {
            body { 
                padding: 8px; 
            }
            
            .container { 
                padding: 16px; 
                border-radius: 12px;
            }
            
            h1 { 
                font-size: 22px; 
            }
            
            .subtitle { 
                font-size: 14px; 
            }
            
            .question { 
                padding: 16px; 
                margin-bottom: 16px;
            }
            
            .question-text { 
                font-size: 15px; 
                margin-bottom: 14px;
            }
            
            label.option-label { 
                padding: 8px 12px; 
                font-size: 14px;
                gap: 8px;
            }
            
            input[type="radio"] { 
                margin-right: 8px; 
            }
            
            .submit-btn { 
                padding: 12px 18px; 
                font-size: 15px; 
            }
            
            .score-display { 
                font-size: 38px; 
            }
            
            .solution-card { 
                padding: 14px; 
                margin-bottom: 12px;
            }
            
            .explanation { 
                padding: 10px; 
                font-size: 13px;
            }
            
            .view-key-btn { 
                padding: 10px 16px; 
                font-size: 14px;
                min-height: 42px;
            }
            
            .tiny-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            
            .controls { 
                gap: 10px; 
                flex-direction: column;
                align-items: stretch;
            }
            
            .view-key-btn, .tiny-btn {
                width: 100%;
            }
            
            .badge { 
                top: 10px; 
                right: 10px; 
                font-size: 12px; 
                padding: 5px 10px; 
            }
        }
        
        @media (max-width: 360px) {
            .container { 
                padding: 14px; 
            }
            
            h1 { 
                font-size: 20px; 
            }
            
            .question { 
                padding: 14px; 
            }
            
            .question-text { 
                font-size: 14px; 
            }
            
            label.option-label { 
                padding: 8px 10px; 
                font-size: 13px;
            }
            
            .submit-btn { 
                padding: 10px 16px; 
                font-size: 14px; 
            }
            
            .score-display { 
                font-size: 34px; 
            }
        }
        
        /* MathJax Mobile Optimization */
        .mjx-math {
            font-size: 1.1em !important;
            line-height: 1.2 !important;
        }
        
        @media (max-width: 767px) {
            .mjx-math {
                font-size: 1em !important;
            }
        }
        
        /* Touch Device Improvements */
        @media (hover: none) and (pointer: coarse) {
            label.option-label, .submit-btn, .view-key-btn, .tiny-btn {
                min-height: 44px;
            }
            
            .submit-btn:hover, .view-key-btn:hover, .tiny-btn:hover, label.option-label:hover {
                transform: none;
            }
            
            .submit-btn:active, .view-key-btn:active, .tiny-btn:active {
                transform: scale(0.98);
            }
            
            label.option-label:active {
                background: #e8f0fe;
            }
        }
</head>
<body>

<div class="container">
    <div id="quiz-header">
        <h1>Algebra Quiz</h1>
        <p class="subtitle">Topics: Polynomials, Equations, and Inequalities — select the best answer and submit to check your work.</p>
    </div>

    <form id="quizForm" action="https://formspree.io/f/xeenqwrv" method="POST">
        <div class="question">
            <div class="question-text">Student Name <span style="color:red">*</span></div>
            <input type="text" name="Student_Name" required placeholder="Your answer">
        </div>

        <!-- Q1 -->
        <div class="question" data-q="Q1_Answer">
            <input type="hidden" name="Q1_Text" value="Simplify: (4x^2 - 3x + 2) + (2x^2 + 5x - 8)">
            <div class="question-text">Q1. Simplify: $(4x^2 - 3x + 2) + (2x^2 + 5x - 8)$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q1_Answer" value="2x^2+2x-6"> $2x^2 + 2x - 6$</label></li>
                <li><label class="option-label"><input type="radio" name="Q1_Answer" value="6x^2+2x-6" required> $6x^2 + 2x - 6$</label></li>
                <li><label class="option-label"><input type="radio" name="Q1_Answer" value="6x^2+8x-6"> $6x^2 + 8x - 6$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q2 -->
        <div class="question" data-q="Q2_Answer">
            <input type="hidden" name="Q2_Text" value="Expand: (x + 5)(x - 3)">
            <div class="question-text">Q2. Expand the expression: $(x + 5)(x - 3)$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q2_Answer" value="x^2+8x+15"> $x^2 + 8x + 15$</label></li>
                <li><label class="option-label"><input type="radio" name="Q2_Answer" value="x^2-2x-15"> $x^2 - 2x - 15$</label></li>
                <li><label class="option-label"><input type="radio" name="Q2_Answer" value="x^2+2x-15" required> $x^2 + 2x - 15$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q3 -->
        <div class="question" data-q="Q3_Answer">
            <input type="hidden" name="Q3_Text" value="Solve for x: 5x - 10 = 2x + 8">
            <div class="question-text">Q3. Solve for $x$: $5x - 10 = 2x + 8$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q3_Answer" value="x=6" required> $x = 6$</label></li>
                <li><label class="option-label"><input type="radio" name="Q3_Answer" value="x=2"> $x = 2$</label></li>
                <li><label class="option-label"><input type="radio" name="Q3_Answer" value="x=-6"> $x = -6$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q4 -->
        <div class="question" data-q="Q4_Answer">
            <input type="hidden" name="Q4_Text" value="Simplify: (x^2 - 16)/(x - 4)">
            <div class="question-text">Q4. Simplify the rational expression: $\dfrac{x^2 - 16}{x - 4}$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q4_Answer" value="x-4"> $x - 4$</label></li>
                <li><label class="option-label"><input type="radio" name="Q4_Answer" value="x+4" required> $x + 4$</label></li>
                <li><label class="option-label"><input type="radio" name="Q4_Answer" value="x+16"> $x + 16$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q5 -->
        <div class="question" data-q="Q5_Answer">
            <input type="hidden" name="Q5_Text" value="Solve inequality: 3(x - 2) <= 9">
            <div class="question-text">Q5. Solve the inequality: $3(x - 2) \le 9$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q5_Answer" value="x<=3"> $x \le 3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q5_Answer" value="x>=5"> $x \ge 5$</label></li>
                <li><label class="option-label"><input type="radio" name="Q5_Answer" value="x<=5" required> $x \le 5$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q6 -->
        <div class="question" data-q="Q6_Answer">
            <input type="hidden" name="Q6_Text" value="Factor: 3x^2 - 12x">
            <div class="question-text">Q6. Factor completely: $3x^2 - 12x$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q6_Answer" value="3x(x-4)" required> $3x(x - 4)$</label></li>
                <li><label class="option-label"><input type="radio" name="Q6_Answer" value="3(x^2-4)"> $3(x^2 - 4)$</label></li>
                <li><label class="option-label"><input type="radio" name="Q6_Answer" value="x(3x-12)"> $x(3x - 12)$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q7 -->
        <div class="question" data-q="Q7_Answer">
            <input type="hidden" name="Q7_Text" value="Simplify: 4/x + 3/x">
            <div class="question-text">Q7. Simplify: $\dfrac{4}{x} + \dfrac{3}{x}$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q7_Answer" value="12/x"> $\dfrac{12}{x}$</label></li>
                <li><label class="option-label"><input type="radio" name="Q7_Answer" value="7/x" required> $\dfrac{7}{x}$</label></li>
                <li><label class="option-label"><input type="radio" name="Q7_Answer" value="7/2x"> $\dfrac{7}{2x}$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q8 -->
        <div class="question" data-q="Q8_Answer">
            <input type="hidden" name="Q8_Text" value="Solve for y: 2(y + 4) = 3y - 1">
            <div class="question-text">Q8. Solve for $y$: $2(y + 4) = 3y - 1$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q8_Answer" value="y=7"> $y = 7$</label></li>
                <li><label class="option-label"><input type="radio" name="Q8_Answer" value="y=-9"> $y = -9$</label></li>
                <li><label class="option-label"><input type="radio" name="Q8_Answer" value="y=9" required> $y = 9$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q9 -->
        <div class="question" data-q="Q9_Answer">
            <input type="hidden" name="Q9_Text" value="Solution to x^2 - 9 = 0">
            <div class="question-text">Q9. Which of the following is a solution to $x^2 - 9 = 0$?</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q9_Answer" value="x=3" required> $x = 3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q9_Answer" value="x=0"> $x = 0$</label></li>
                <li><label class="option-label"><input type="radio" name="Q9_Answer" value="x=9"> $x = 9$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q10 -->
        <div class="question" data-q="Q10_Answer">
            <input type="hidden" name="Q10_Text" value="Solve inequality: -2x + 4 < 10">
            <div class="question-text">Q10. Solve the inequality: $-2x + 4 < 10$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q10_Answer" value="x<-3"> $x < -3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q10_Answer" value="x>-3" required> $x > -3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q10_Answer" value="x>-7"> $x > -7$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q11 -->
        <div class="question" data-q="Q11_Answer">
            <input type="hidden" name="Q11_Text" value="Multiply: (2x^3)(5x^4)">
            <div class="question-text">Q11. Multiply: $(2x^3)(5x^4)$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q11_Answer" value="10x^12"> $10x^{12}$</label></li>
                <li><label class="option-label"><input type="radio" name="Q11_Answer" value="7x^7"> $7x^7$</label></li>
                <li><label class="option-label"><input type="radio" name="Q11_Answer" value="10x^7" required> $10x^7$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q12 -->
        <div class="question" data-q="Q12_Answer">
            <input type="hidden" name="Q12_Text" value="Simplify: 15a^5 / 3a^2">
            <div class="question-text">Q12. Simplify: $\dfrac{15a^5}{3a^2}$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q12_Answer" value="5a^3" required> $5a^3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q12_Answer" value="12a^3"> $12a^3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q12_Answer" value="5a^7"> $5a^7$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q13 -->
        <div class="question" data-q="Q13_Answer">
            <input type="hidden" name="Q13_Text" value="Solve system: x + y = 5, x - y = 1">
            <div class="question-text">Q13. Solve the system for $x$: $x + y = 5$ and $x - y = 1$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q13_Answer" value="x=2"> $x = 2$</label></li>
                <li><label class="option-label"><input type="radio" name="Q13_Answer" value="x=3" required> $x = 3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q13_Answer" value="x=4"> $x = 4$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q14 -->
        <div class="question" data-q="Q14_Answer">
            <input type="hidden" name="Q14_Text" value="Value of 2x^2 - 5x when x = 3">
            <div class="question-text">Q14. Find the value of $2x^2 - 5x$ when $x = 3$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q14_Answer" value="9"> $9$</label></li>
                <li><label class="option-label"><input type="radio" name="Q14_Answer" value="-3"> $-3$</label></li>
                <li><label class="option-label"><input type="radio" name="Q14_Answer" value="3" required> $3$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <!-- Q15 -->
        <div class="question" data-q="Q15_Answer">
            <input type="hidden" name="Q15_Text" value="Simplify: (x + 2)^2">
            <div class="question-text">Q15. Simplify: $(x + 2)^2$</div>
            <ul class="options">
                <li><label class="option-label"><input type="radio" name="Q15_Answer" value="x^2+4"> $x^2 + 4$</label></li>
                <li><label class="option-label"><input type="radio" name="Q15_Answer" value="x^2+4x+4" required> $x^2 + 4x + 4$</label></li>
                <li><label class="option-label"><input type="radio" name="Q15_Answer" value="x^2+2x+4"> $x^2 + 2x + 4$</label></li>
            </ul>
            <div class="feedback" aria-live="polite"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Quiz</button>
    </form>

    <div id="result-section">
        <h2>Submission Received!</h2>
        <p>Your Final Score:</p>
        <div class="score-display" id="scoreValue">0/15</div>
        <div class="controls">
            <button class="view-key-btn" id="showWrongBtn">Review Incorrect Only</button>
            <button class="view-key-btn" id="showAllBtn" style="background:#1a73e8;">Show All Explanations</button>
            <button class="tiny-btn" id="restartBtn">Restart Quiz</button>
        </div>
    </div>

    <div id="answer-key">
        <h3>Step-by-Step Solutions</h3>
        <div id="key-content"></div>
        <button class="submit-btn" onclick="location.reload()" style="margin-top:20px; background-color: #5f6368;">Restart Quiz</button>
    </div>

    <!-- Footer identifying the creator -->
    <footer class="footer" aria-label="copyright and author">
        <div>© 2026 GED prep. Form created by <span class="author">Aung Naing Min</span>.</div>
        <div style="font-size:12px; margin-top:6px; color:#80868b;">For educational use only.</div>
    </footer>
</div>

<script>
    const correctAnswers = {
        Q1_Answer: "6x^2+2x-6", Q2_Answer: "x^2+2x-15", Q3_Answer: "x=6", Q4_Answer: "x+4", Q5_Answer: "x<=5",
        Q6_Answer: "3x(x-4)", Q7_Answer: "7/x", Q8_Answer: "y=9", Q9_Answer: "x=3", Q10_Answer: "x>-3",
        Q11_Answer: "10x^7", Q12_Answer: "5a^3", Q13_Answer: "x=3", Q14_Answer: "3", Q15_Answer: "x^2+4x+4"
    };

    const solutionLogic = {
        Q1_Answer: "Combine like terms: $(4+2)x^2 + (-3+5)x + (2-8) = 6x^2+2x-6$.",
        Q2_Answer: "Use FOIL: $x^2 - 3x + 5x - 15 = x^2+2x-15$.",
        Q3_Answer: "Subtract $2x$ and add $10$: $3x = 18 \\\rightarrow x = 6$.",
        Q4_Answer: "Factor numerator: $\\frac{(x-4)(x+4)}{x-4} = x+4$.",
        Q5_Answer: "Divide by $3$: $x-2 \\\le 3 \\\rightarrow x \\\le 5$.",
        Q6_Answer: "Factor out the GCF $3x$: $3x(x-4)$.",
        Q7_Answer: "Common denominator: $\\frac{4+3}{x} = \\frac{7}{x}$.",
        Q8_Answer: "Distribute: $2y+8 = 3y-1 \\\rightarrow 8+1 = 3y-2y \\\rightarrow y=9$.",
        Q9_Answer: "$x^2=9 \\\rightarrow x=3$ or $x=-3$.",
        Q10_Answer: "$-2x < 6$. Divide by $-2$ and **flip the inequality sign**: $x > -3$.",
        Q11_Answer: "Multiply constants and add exponents: $2 \\cdot 5 \\cdot x^{3+4} = 10x^7$.",
        Q12_Answer: "Divide constants and subtract exponents: $\\frac{15}{3} \\cdot a^{5-2} = 5a^3$.",
        Q13_Answer: "Add equations: $2x = 6 \\\rightarrow x = 3$.",
        Q14_Answer: "$2(3)^2 - 5(3) = 18 - 15 = 3$.",
        Q15_Answer: "Perfect square trinomial: $x^2 + 2(x)(2) + 2^2 = x^2+4x+4$."
    };

    const form = document.getElementById('quizForm');
    const resultSection = document.getElementById('result-section');
    const scoreValue = document.getElementById('scoreValue');
    const answerKeyEl = document.getElementById('answer-key');
    const keyContent = document.getElementById('key-content');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        let score = 0;
        const formData = new FormData(this);

        // Clear previous badges/feedback
        document.querySelectorAll('.question').forEach(q => {
            q.classList.remove('correct','incorrect');
            const badge = q.querySelector('.badge'); if(badge) badge.remove();
            const fb = q.querySelector('.feedback'); if(fb) fb.innerHTML = '';
            q.querySelectorAll('label.option-label').forEach(l => l.classList.remove('correct-label','selected-wrong','selected-correct'));
        });

        for (let key in correctAnswers) {
            const inputs = document.getElementsByName(key);
            if (!inputs || inputs.length === 0) continue;
            const questionDiv = inputs[0].closest('.question');
            const correct = correctAnswers[key];
            const selected = formData.get(key);

            // create badge
            const badge = document.createElement('span'); badge.className = 'badge';

            const fb = questionDiv.querySelector('.feedback');

            if (selected === correct) {
                score++;
                questionDiv.classList.add('correct');
                badge.classList.add('correct'); badge.textContent = 'Correct';
                // highlight chosen label
                for (const inp of inputs) {
                    const lab = inp.parentElement;
                    if (inp.checked) lab.classList.add('selected-correct');
                    if (inp.value === correct) lab.classList.add('correct-label');
                }
                fb.innerHTML = '<div style="color:#0b8043;font-weight:600">Nice work — correct.</div>';
            } else {
                questionDiv.classList.add('incorrect');
                badge.classList.add('incorrect'); badge.textContent = 'Incorrect';

                // mark student's selection and correct label
                for (const inp of inputs) {
                    const lab = inp.parentElement;
                    if (inp.checked) lab.classList.add('selected-wrong');
                    if (inp.value === correct) lab.classList.add('correct-label');
                }

                // Provide helpful feedback with explanation
                const your = selected ? `<div class="your">Your answer: ${escapeHtml(selected)}</div>` : '<div class="your">Your answer: <em>None selected</em></div>';
                fb.innerHTML = `${your}<div style="margin-top:6px">Correct answer: <strong>${escapeHtml(correct)}</strong></div><div class="explanation">${solutionLogic[key]}</div>`;
            }

            // append badge once per question
            questionDiv.appendChild(badge);
        }

        // Send to Formspree (fire-and-forget)
        fetch(this.action, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } }).catch(()=>{});

        // Toggle Views and show result
        document.getElementById('quizForm').style.display = 'none';
        document.getElementById('quiz-header').style.display = 'none';
        scoreValue.innerText = `${score}/15`;
        resultSection.style.display = 'block';

        // prepare key content for buttons
        buildKeyContent();

        // ensure MathJax renders any math in explanations
        if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise().catch(()=>{});
    });

    function buildKeyContent() {
        keyContent.innerHTML = '';
        let count = 1;
        for (let key in correctAnswers) {
            const correct = correctAnswers[key];
            const card = document.createElement('div'); card.className = 'solution-card';
            card.dataset.key = key;
            card.innerHTML = `<strong>Question ${count}:</strong> <span class="correct-ans">${escapeHtml(correct)}</span><div class="explanation">${solutionLogic[key]}</div>`;
            keyContent.appendChild(card);
            count++;
        }
    }

    // Show only wrong explanations or all
    document.getElementById('showWrongBtn').addEventListener('click', function(){ showKey('wrong'); });
    document.getElementById('showAllBtn').addEventListener('click', function(){ showKey('all'); });
    document.getElementById('restartBtn').addEventListener('click', function(){ location.reload(); });

    function showKey(filter = 'all') {
        // show/hide cards based on answers
        const cards = Array.from(keyContent.querySelectorAll('.solution-card'));
        // Map answers
        const answerMap = {};
        for (let key in correctAnswers) {
            const inputs = document.getElementsByName(key);
            if (!inputs || inputs.length === 0) continue;
            const selected = Array.from(inputs).find(i => i.checked)?.value || null;
            answerMap[key] = selected;
        }

        cards.forEach(card => {
            const key = card.dataset.key;
            const correct = correctAnswers[key];
            const selected = answerMap[key];
            if (filter === 'all') {
                card.style.display = 'block';
            } else if (filter === 'wrong') {
                if (selected !== correct) card.style.display = 'block'; else card.style.display = 'none';
            }
        });

        answerKeyEl.style.display = 'block';
        // scroll to key
        answerKeyEl.scrollIntoView({ behavior: 'smooth' });
        if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise().catch(()=>{});
    }

    // small helper to escape HTML in inserted strings
    function escapeHtml(unsafe) {
        if (!unsafe && unsafe !== 0) return '';
        return String(unsafe).replace(/[&<>"']/g, function(m) { return ({'&':'&amp;','<':'&lt;','>':'&gt;', '"':'&quot;', "'":"&#039;"})[m]; });
    }
</script>

</body>
</html>
