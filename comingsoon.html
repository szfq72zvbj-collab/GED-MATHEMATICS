<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chapter Module — GED Prep</title>
  <style>
    /* Professional Coming Soon Style */
    :root {
      --bg: #f8fafc;
      --container-bg: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --accent: #10b981;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--container-bg);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
      opacity: 0.7;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    p {
      color: var(--text-light);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 14px 32px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn::before {
      content: '←';
    }

    footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border-light);
      font-size: 13px;
      color: var(--text-muted);
    }

    footer strong {
      color: var(--text);
      font-weight: 600;
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .container { padding: 32px 24px; }
      h1 { font-size: 24px; }
      p { font-size: 15px; }
      .icon { font-size: 56px; }
    }
  </style>
</head>
<body>

  <main class="container">
    <div class="icon">🚧</div>
    <h1>Content Coming Soon</h1>
    <p>This chapter is currently being developed with comprehensive learning materials, interactive exercises, and detailed explanations. We're working hard to deliver the best GED preparation experience.</p>
    
    <a href="dashboard.html" class="btn">Return to Dashboard</a>

    <footer>
      © 2026 GED Prep — Created by <strong>Aung Naing Min</strong>
    </footer>
  </main>

</body>
</html>
